  <title>H-GAC - Post Event Analysis (Mock)</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* Model Scenarios mega-menu (cascading) */
    .pm-container {
      position: relative;
      display: inline-block;
    }

    .tabs .tab .pm-container {
      position: relative;
    }

    .pm-trigger {
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: inherit;
      font-weight: inherit;
      color: inherit;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .pm-trigger:hover,
    .pm-trigger[aria-expanded="true"] {
      opacity: 0.8;
    }

    .tabs .tab .pm-trigger {
      color: inherit;
    }

    .pm-trigger-icon {
      font-size: 11px;
    }

    .pm-menu {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 1000;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);
      padding: 8px 0;
      display: none;
      min-width: 240px;
      transition: min-width 0.2s ease;
    }

    .pm-menu.open {
      display: block;
    }

    .pm-columns {
      position: relative;
      display: block;
      height: 320px;
      padding: 4px 0;
    }

    .pm-column {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 240px;
      overflow-y: auto;
      padding: 4px 0;
      box-sizing: border-box;
    }

    .pm-column-main { left: 0; border-right: 1px solid #f0f0f0; }
    .pm-column-sub { 
      left: 240px; 
      border-right: 1px solid #f0f0f0; 
      display: none;
    }
    .pm-column-subsub { 
      left: 480px; 
      display: none;
    }
    .pm-column-sub.visible { display: block; }
    .pm-column-subsub.visible { display: block; }

    .pm-column-title {
      padding: 6px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
    }

    .pm-item {
      padding: 8px 18px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      white-space: nowrap;
      transition: background-color 0.12s, color 0.12s;
    }

    .pm-item:hover,
    .pm-item.pm-hover {
      background: #f3f7ef;
    }

    .pm-item.pm-selected-leaf {
      background: #2d5016;
      color: #fff;
    }

    .pm-item-label {
      flex: 1;
    }

    .pm-item-chevron {
      font-size: 10px;
      color: #999;
      margin-left: 8px;
    }

    .pm-item.has-children .pm-item-chevron {
      display: inline-block;
    }

    .pm-item:not(.has-children) .pm-item-chevron {
      display: none;
    }

    .pm-item:focus-visible {
      outline: 2px solid var(--accent, #4A90E2);
      outline-offset: -2px;
    }

    @media (max-width: 900px) {
      .pm-menu {
        min-width: 100%;
        right: auto;
      }
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .post-event-full-width {
      width: 100vw;
      max-width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding: 0;
    }

    .post-event-full-width .grid {
      display: block;
      width: 100vw;
      max-width: 100vw;
      margin: 0;
      padding: 0;
    }

    .post-event-full-width .map-card {
      width: 100vw;
      max-width: 100vw;
      margin: 0;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
      height: calc(100vh - 80px) !important;
      min-height: 1050px !important;
    }

    .post-event-full-width .map-toolbar {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .post-event-full-width .map {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* View toggle (Travel Time / Congestion) */
    .pe-view-toggle {
      display: inline-flex;
      align-items: center;
      background: var(--panel, #f3f4f8);
      border: 1px solid rgba(91,108,248,0.18);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .pe-view-toggle .pe-toggle-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--ink, #1f2937);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }

    .pe-view-toggle .pe-toggle-btn:hover {
      background: rgba(91,108,248,0.08);
    }

    .pe-view-toggle .pe-toggle-btn.active {
      background: var(--accent, #5b6cf8);
      color: #fff;
      box-shadow: 0 2px 6px rgba(91,108,248,0.35);
    }

    .pe-view-toggle .pe-toggle-btn:focus-visible {
      outline: 2px solid var(--accent, #5b6cf8);
      outline-offset: 2px;
    }
  </style>
